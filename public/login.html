<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
.login-container{
background:white;
padding:50px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
animation:fadeIn 0.5s ease-in;
max-width:450px;
width:90%;
}

.login-container h2{
text-align:center;
background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
font-size:32px;
margin-bottom:30px;
}

.form-group{
margin-bottom:25px;
}

.form-group input{
width:100%;
padding:15px 20px;
border:2px solid #e0e0e0;
border-radius:10px;
font-size:16px;
outline:none;
transition:all 0.3s ease;
}

.form-group input:focus{
border-color:#667eea;
box-shadow:0 0 0 3px rgba(102,126,234,0.1);
}

.submit-btn{
width:100%;
padding:15px;
background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
box-shadow:0 4px 15px rgba(102,126,234,0.3);
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(102,126,234,0.4);
}

.register-link{
text-align:center;
margin-top:25px;
color:#666;
}

.register-link a{
color:#667eea;
text-decoration:none;
font-weight:600;
transition:color 0.3s ease;
}

.register-link a:hover{
color:#764ba2;
}

.forgot-password-link{
text-align:center;
margin-top:15px;
}

.forgot-password-link a{
color:#667eea;
text-decoration:none;
font-size:14px;
transition:color 0.3s ease;
}

.forgot-password-link a:hover{
color:#764ba2;
text-decoration:underline;
}

.password-wrapper{
position:relative;
display:flex;
align-items:center;
}

.toggle-password-btn{
position:absolute;
right:15px;
background:none;
border:none;
cursor:pointer;
font-size:18px;
color:#666;
padding:0;
transition:color 0.3s ease;
}

.toggle-password-btn:hover{
color:#667eea;
}

.captcha-container{
margin: 20px 0;
padding: 15px;
background: #f8f9fa;
border-radius: 8px;
border: 1px solid #e0e0e0;
}

.captcha-wrapper{
display: flex;
gap: 10px;
align-items: center;
margin-bottom: 10px;
}

.captcha-canvas{
background: white;
border: 2px solid #667eea;
border-radius: 4px;
cursor: pointer;
}

.captcha-refresh-btn{
padding: 10px 15px;
background: #667eea;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
transition: all 0.2s ease;
}

.captcha-refresh-btn:hover{
background: #764ba2;
}
</style>
</head>

<body>

<div class="login-container">
<h2>Welcome Back</h2>

<form id="loginForm">
<div class="form-group">
<input id="username" placeholder="Username"required>
</div>
<div class="form-group">
<div class="password-wrapper">
<input id="password" type="password" placeholder="Password"required>
<button type="button" class="toggle-password-btn" onclick="togglePassword('password', this)">👁️</button>
</div>
</div>

<p class="forgot-password-link"><a href="#" onclick="openForgotPasswordModal(); return false;">Forgot Password?</a></p>

<div class="captcha-container">
<label style="display:block;margin-bottom:10px;color:#666;font-size:14px;">Security Verification</label>
<div class="captcha-wrapper">
<canvas id="captchaCanvas" class="captcha-canvas" width="200" height="60"></canvas>
<button type="button" class="captcha-refresh-btn" onclick="generateCaptcha()">↻ Refresh</button>
</div>
<input type="text" id="captchaInput" placeholder="Enter the text shown above" maxlength="6"required style="width:100%;padding:12px 16px;border:1px solid #ccc;border-radius:4px;font-size:15px;outline:none;letter-spacing:3px;text-align:center;">
</div>

<button type="submit" class="submit-btn">Login</button>
</form>

<p class="register-link">No account? <a href="register.html">Register here</a></p>
</div>

<script>
let currentCaptcha = '';

// Generate CAPTCHA on page load
document.addEventListener('DOMContentLoaded', function() {
generateCaptcha();

// Allow clicking canvas to refresh
document.getElementById('captchaCanvas').addEventListener('click', generateCaptcha);
});

// CAPTCHA generation function
function generateCaptcha() {
const canvas = document.getElementById('captchaCanvas');
const ctx = canvas.getContext('2d');

// Clear canvas
ctx.clearRect(0, 0, canvas.width, canvas.height);

// Add background gradient
const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
gradient.addColorStop(0, '#f8f9fa');
gradient.addColorStop(1, '#e9ecef');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Generate random captcha text
const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjmnpqrstuvwx23456789';
let captcha = '';
for (let i = 0; i < 6; i++) {
captcha += chars.charAt(Math.floor(Math.random() * chars.length));
}
currentCaptcha = captcha;

// Add noise lines
for (let i = 0; i < 7; i++) {
ctx.beginPath();
ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
ctx.strokeStyle = `rgba(${Math.random()*100+100},${Math.random()*100+100},${Math.random()*100+100},0.3)`;
ctx.lineWidth = 1 + Math.random() * 2;
ctx.stroke();
}

// Add noise dots
for (let i = 0; i < 50; i++) {
ctx.beginPath();
ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1 + Math.random() * 2, 0, 2 * Math.PI);
ctx.fillStyle = `rgba(${Math.random()*100+100},${Math.random()*100+100},${Math.random()*100+100},0.4)`;
ctx.fill();
}

// Draw captcha text with different colors and rotations
const fontSize = 28;
const charWidth = canvas.width/ 6;
for (let i = 0; i < captcha.length; i++) {
const char = captcha[i];
ctx.save();

// Random color for each character
const r = Math.floor(Math.random() * 100) + 50;
const g = Math.floor(Math.random() * 100) + 50;
const b = Math.floor(Math.random() * 100) + 50;
ctx.fillStyle = `rgb(${r},${g},${b})`;

// Font settings
ctx.font = `bold ${fontSize}px Arial`;
ctx.textBaseline = 'middle';

// Position and rotate
const x = i * charWidth + charWidth/ 2;
const y = canvas.height / 2 + (Math.random() - 0.5) * 10;
const angle = (Math.random() - 0.5) * 0.4;

ctx.translate(x, y);
ctx.rotate(angle);
ctx.fillText(char, 0, 0);

ctx.restore();
}

// Add border
ctx.strokeStyle = '#667eea';
ctx.lineWidth = 2;
ctx.strokeRect(0, 0, canvas.width, canvas.height);
}

// Clear captcha input when canvas is clicked
document.addEventListener('DOMContentLoaded', function() {
document.getElementById('captchaCanvas').addEventListener('click', function() {
document.getElementById('captchaInput').value = '';
document.getElementById('captchaInput').focus();
});
});

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault(); // stops GET request

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;
const captchaInput=document.getElementById("captchaInput").value;

// Validate CAPTCHA (case-sensitive)
if(captchaInput !== currentCaptcha){
alert("Incorrect CAPTCHA. Please try again.");
generateCaptcha();
document.getElementById('captchaInput').value = '';
document.getElementById('captchaInput').focus();
return;
}

const res = await fetch("http://localhost:3000/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
});

const data = await res.json();

if(data.success){
// Clear any previous session and set new username
localStorage.clear();
localStorage.setItem("username",username);
window.location="chat.html";

}else{

alert(data.message);
generateCaptcha();
document.getElementById('captchaInput').value = '';
document.getElementById('captchaInput').focus();

}

});

// Toggle password visibility
function togglePassword(inputId, btn) {
const input = document.getElementById(inputId);
if (input.type === 'password') {
input.type = 'text';
btn.textContent = '🙈';
} else {
input.type = 'password';
btn.textContent = '👁️';
}
}

// Forgot Password functions
let otpSent = false;
let generatedOTP = '';

function openForgotPasswordModal() {
document.getElementById('forgotPasswordModal').style.display = 'flex';
otpSent = false;
generatedOTP = '';
document.getElementById('otpVerificationSection').style.display = 'none';
document.getElementById('resetEmail').value = '';
}

function closeForgotPasswordModal() {
document.getElementById('forgotPasswordModal').style.display = 'none';
}

async function sendOTP() {
const email = document.getElementById('resetEmail').value.trim();

if (!email) {
alert('Please enter your email address');
return;
}

// Validate email format
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailRegex.test(email)) {
alert('Please enter a valid email address');
return;
}

// Show loading
const btnText = document.getElementById('sendOTPText');
const btnLoading = document.getElementById('sendOTPLoading');
const submitBtn = document.getElementById('sendOTPBtn');
btnText.style.display = 'none';
btnLoading.style.display = 'inline';
submitBtn.disabled = true;

try {
// Call backend to send OTP
const res = await fetch('/sendResetOTP', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email })
});

const data = await res.json();

if (data.success) {
generatedOTP = data.otp; // In production, this would be stored server-side only
alert('OTP sent to your email!');
otpSent = true;
document.getElementById('otpVerificationSection').style.display = 'block';
document.getElementById('resetEmail').disabled = true;
} else {
alert(data.message || 'Failed to send OTP');
btnText.style.display = 'inline';
btnLoading.style.display = 'none';
submitBtn.disabled = false;
}
} catch (err) {
console.error(err);
alert('Failed to send OTP. Please try again.');
btnText.style.display = 'inline';
btnLoading.style.display = 'none';
submitBtn.disabled = false;
}
}

function focusNextOTP(input, index) {
const value = input.value;
if (value.length === 1 && index < 6) {
const nextInput = input.parentElement.children[index];
if (nextInput) nextInput.focus();
}
}

async function verifyOTPAndReset() {
const otpInputs = document.querySelectorAll('.otp-input');
let enteredOTP = '';
otpInputs.forEach(input => {
enteredOTP += input.value;
});

if (enteredOTP.length !== 6) {
alert('Please enter all 6 digits of the OTP');
return;
}

// Show loading
const btnText = document.getElementById('verifyOTPText');
const btnLoading = document.getElementById('verifyOTPLoading');
const submitBtn = document.getElementById('verifyOTPBtn');
btnText.style.display = 'none';
btnLoading.style.display = 'inline';
submitBtn.disabled = true;

try {
const email = document.getElementById('resetEmail').value.trim();

// Verify OTP and reset password
const res = await fetch('/verifyResetOTP', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email, otp: enteredOTP })
});

const data = await res.json();

if (data.success) {
alert(`Password reset successful! Your temporary password is: ${data.tempPassword}\n\nPlease login with this password.`);
closeForgotPasswordModal();
} else {
alert(data.message || 'Invalid OTP');
btnText.style.display = 'inline';
btnLoading.style.display = 'none';
submitBtn.disabled = false;
}
} catch (err) {
console.error(err);
alert('Verification failed. Please try again.');
btnText.style.display = 'inline';
btnLoading.style.display = 'none';
submitBtn.disabled = false;
}
}

async function resendOTP() {
const email = document.getElementById('resetEmail').value.trim();
await sendOTP();
}

// Close modal when clicking outside
window.onclick = function(event) {
const modal = document.getElementById('forgotPasswordModal');
if (event.target == modal) {
closeForgotPasswordModal();
}
}

</script>

<!-- Forgot Password Modal -->
<div id="forgotPasswordModal" class="modal">
<div class="modal-content">
<button class="modal-close-btn" onclick="closeForgotPasswordModal()">&times;</button>
<h3>Reset Password</h3>
<p style="color:#666;font-size:14px;margin-bottom:20px;">Enter your email to receive an OTP</p>

<div class="form-group">
<input type="email" id="resetEmail" placeholder="Your email address"required>
</div>

<button onclick="sendOTP()" class="submit-btn" id="sendOTPBtn">
<span id="sendOTPText">Send OTP</span>
<span id="sendOTPLoading" style="display:none;">Sending...</span>
</button>

<!-- OTP Verification Section (hidden initially) -->
<div id="otpVerificationSection" style="display:none;margin-top:20px;">
<div class="otp-inputs">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 1)">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 2)">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 3)">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 4)">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 5)">
<input type="text" class="otp-input" maxlength="1" oninput="focusNextOTP(this, 6)">
</div>

<button onclick="verifyOTPAndReset()" class="submit-btn" id="verifyOTPBtn">
<span id="verifyOTPText">Verify & Reset</span>
<span id="verifyOTPLoading" style="display:none;">Verifying...</span>
</button>

<p class="resend-text">
Didn't receive OTP? <a href="#" class="resend-link" onclick="resendOTP(); return false;">Resend</a>
</p>
</div>
</div>
</div>

<script>
</script>

</body>
</html>
