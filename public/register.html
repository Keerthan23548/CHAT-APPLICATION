<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
<style>
.register-container{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 1px 1px 0 rgba(0,0,0,.06),0 2px 5px 0 rgba(0,0,0,.2);
animation:fadeIn 0.5s ease-in;
max-width:450px;
width:90%;
}

.register-container h2{
text-align:center;
color:#111;
font-size:28px;
margin-bottom:10px;
font-weight:500;
}

.register-subtitle{
text-align:center;
color:#666;
font-size:14px;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
color:#111;
font-size:14px;
margin-bottom:8px;
font-weight:500;
}

.form-group input{
width:100%;
padding:12px 16px;
border:1px solid #ccc;
border-radius:4px;
font-size:15px;
outline:none;
transition:border 0.2s ease;
}

.form-group input:focus{
border-color:#25d366;
}

.captcha-container{
margin: 20px 0;
padding: 15px;
background: #f8f9fa;
border-radius: 8px;
border: 1px solid #e0e0e0;
}

.captcha-wrapper{
display: flex;
gap: 10px;
align-items: center;
margin-bottom: 10px;
}

.captcha-canvas{
background: white;
border: 2px solid #25d366;
border-radius: 4px;
cursor: pointer;
}

.captcha-refresh-btn{
padding: 10px 15px;
background: #25d366;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
transition: all 0.2s ease;
}

.captcha-refresh-btn:hover{
background: #128c7d;
}

.captcha-input{
width: 100% !important;
padding: 12px 16px !important;
border: 1px solid #ccc !important;
border-radius: 4px !important;
font-size: 15px !important;
outline: none !important;
letter-spacing: 3px;
font-weight: 600;
text-align: center;
}

.submit-btn{
width:100%;
padding:14px;
background:#25d366;
color:white;
border:none;
border-radius:4px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:all 0.2s ease;
margin-top:10px;
}

.submit-btn:hover{
background:#128c7d;
}

.submit-btn:disabled{
background:#ccc;
cursor:not-allowed;
}

.login-link{
text-align:center;
margin-top:25px;
color:#666;
font-size:14px;
}

.login-link a{
color:#007aff;
text-decoration:none;
font-weight:500;
transition:color 0.2s ease;
}

.login-link a:hover{
color:#0056b3;
}

.otp-section{
display:none;
}

.otp-inputs{
display:flex;
gap:8px;
justify-content:center;
margin:20px 0;
}

.otp-input{
width:50px !important;
height:50px;
text-align:center;
font-size:20px !important;
font-weight:bold;
}

.resend-text{
text-align:center;
color:#666;
font-size:13px;
margin-top:15px;
}

.resend-link{
color:#007aff;
cursor:pointer;
text-decoration:none;
font-weight:500;
}

.resend-link:hover{
text-decoration:underline;
}

.password-wrapper{
position:relative;
display:flex;
align-items:center;
}

.toggle-password-btn{
position:absolute;
right:15px;
background:none;
border:none;
cursor:pointer;
font-size:18px;
color:#666;
padding:0;
transition:color 0.3s ease;
}

.toggle-password-btn:hover{
color:#25d366;
}
</style>
</head>

<body>

<div class="register-container">
<h2>Create Account</h2>
<p class="register-subtitle">Enter your details to get started</p>

<form id="registerForm">
<div class="form-group">
<label for="username">Full Name</label>
<input type="text" id="username" placeholder="Enter your name"required>
</div>

<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" placeholder="your@email.com"required style="width:100%;padding:12px 16px;border:1px solid #ccc;border-radius:4px;font-size:15px;outline:none;">
</div>

<div class="form-group">
<label for="password">Password</label>
<div class="password-wrapper">
<input type="password" id="password" placeholder="Create a strong password"required minlength="6" style="width:100%;padding:12px 16px;border:1px solid #ccc;border-radius:4px;font-size:15px;outline:none;">
<button type="button" class="toggle-password-btn" onclick="togglePassword('password', this)">👁️</button>
</div>
</div>

<div class="captcha-container">
<label>Security Verification</label>
<div class="captcha-wrapper">
<canvas id="captchaCanvas" class="captcha-canvas" width="200" height="60"></canvas>
<button type="button" class="captcha-refresh-btn" onclick="generateCaptcha()">↻ Refresh</button>
</div>
<input type="text" id="captchaInput" class="captcha-input" placeholder="Enter the text shown above" maxlength="6"required>
</div>

<button type="submit" class="submit-btn" id="registerBtn">
<span id="btnText">Register</span>
<span id="btnLoading" style="display:none;">Registering...</span>
</button>
</form>

<p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script>
let currentCaptcha = '';

// Generate CAPTCHA on page load
document.addEventListener('DOMContentLoaded', function() {
generateCaptcha();

// Allow clicking canvas to refresh
document.getElementById('captchaCanvas').addEventListener('click', generateCaptcha);
});

// CAPTCHA generation function
function generateCaptcha() {
const canvas = document.getElementById('captchaCanvas');
const ctx = canvas.getContext('2d');

// Clear canvas
ctx.clearRect(0, 0, canvas.width, canvas.height);

// Add background gradient
const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
gradient.addColorStop(0, '#f8f9fa');
gradient.addColorStop(1, '#e9ecef');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Generate random captcha text
const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjmnpqrstuvwx23456789';
let captcha = '';
for (let i = 0; i < 6; i++) {
captcha += chars.charAt(Math.floor(Math.random() * chars.length));
}
currentCaptcha = captcha;

// Add noise lines
for (let i = 0; i < 7; i++) {
ctx.beginPath();
ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
ctx.strokeStyle = `rgba(${Math.random()*100+100},${Math.random()*100+100},${Math.random()*100+100},0.3)`;
ctx.lineWidth = 1 + Math.random() * 2;
ctx.stroke();
}

// Add noise dots
for (let i = 0; i < 50; i++) {
ctx.beginPath();
ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1 + Math.random() * 2, 0, 2 * Math.PI);
ctx.fillStyle = `rgba(${Math.random()*100+100},${Math.random()*100+100},${Math.random()*100+100},0.4)`;
ctx.fill();
}

// Draw captcha text with different colors and rotations
const fontSize = 28;
const charWidth = canvas.width/ 6;
for (let i = 0; i < captcha.length; i++) {
const char = captcha[i];
ctx.save();

// Random color for each character
const r = Math.floor(Math.random() * 100) + 50;
const g = Math.floor(Math.random() * 100) + 50;
const b = Math.floor(Math.random() * 100) + 50;
ctx.fillStyle = `rgb(${r},${g},${b})`;

// Font settings
ctx.font = `bold ${fontSize}px Arial`;
ctx.textBaseline = 'middle';

// Position and rotate
const x = i * charWidth + charWidth/ 2;
const y = canvas.height / 2 + (Math.random() - 0.5) * 10;
const angle = (Math.random() - 0.5) * 0.4;

ctx.translate(x, y);
ctx.rotate(angle);
ctx.fillText(char, 0, 0);

ctx.restore();
}

// Add border
ctx.strokeStyle = '#25d366';
ctx.lineWidth = 2;
ctx.strokeRect(0, 0, canvas.width, canvas.height);
}

// Clear captcha input when canvas is clicked
document.addEventListener('DOMContentLoaded', function() {
document.getElementById('captchaCanvas').addEventListener('click', function() {
document.getElementById('captchaInput').value = '';
document.getElementById('captchaInput').focus();
});
});

document.getElementById("registerForm").addEventListener("submit", async function(e){
e.preventDefault();

const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const captchaInput = document.getElementById("captchaInput").value;

// Validate email format
const emailRegex= /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if(!email || !emailRegex.test(email)){
alert("Please enter a valid email address");
return;
}

// Validate password strength
if(password.length < 6){
alert("Password must be at least 6 characters long");
return;
}

// Validate CAPTCHA (case-sensitive)
if(captchaInput !== currentCaptcha){
alert("Incorrect CAPTCHA. Please try again.");
generateCaptcha();
document.getElementById('captchaInput').value = '';
document.getElementById('captchaInput').focus();
return;
}

// Show loading state
const btnText = document.getElementById("btnText");
const btnLoading = document.getElementById("btnLoading");
const submitBtn = document.getElementById("registerBtn");
btnText.style.display = "none";
btnLoading.style.display = "inline";
submitBtn.disabled = true;

try{
const res = await fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,email,password})
});

const data = await res.json();

if(data.success){
alert("Registration successful! Please login.");
window.location.href="login.html";
}else{
alert(data.message || "Registration failed");
generateCaptcha();
document.getElementById('captchaInput').value = '';
resetButtonState();
}
}catch(err){
console.error(err);
alert("Registration failed. Please try again.");
generateCaptcha();
document.getElementById('captchaInput').value = '';
resetButtonState();
}
});

function resetButtonState(){
const btnText = document.getElementById("btnText");
const btnLoading = document.getElementById("btnLoading");
const submitBtn = document.getElementById("registerBtn");
btnText.style.display = "inline";
btnLoading.style.display = "none";
submitBtn.disabled = false;
}

// Toggle password visibility
function togglePassword(inputId, btn) {
const input = document.getElementById(inputId);
if (input.type === 'password') {
input.type = 'text';
btn.textContent = '🙈';
} else {
input.type = 'password';
btn.textContent = '👁️';
}
}
</script>

</body>
</html>
